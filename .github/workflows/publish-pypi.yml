name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # IMPORTANT: This permission is required for Trusted Publishing (OIDC)
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build hatchling
        
    - name: Build package
      run: python -m build
      
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      # With Trusted Publishing, no password/token is needed here.
      # Ensure you have configured the Trusted Publisher on PyPI for this repo.
