read_users:
  name: Read users
  description: Fetch the complete list of registered users from the lock. Requires Master Mode (scan Master Card first).
  target:
    entity:
      domain: lock
      integration: iseo_argo_ble

delete_user:
  name: Delete user
  description: Remove a user from the lock's whitelist by their UUID. Requires Master Mode (scan Master Card first).
  target:
    entity:
      domain: lock
      integration: iseo_argo_ble
  fields:
    uuid:
      name: UUID
      description: The 32-character hex UUID of the user to remove.
      required: true
      example: "EAA06132486F426CB0D26C6B9B578ADD"
